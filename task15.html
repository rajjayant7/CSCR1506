<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Table</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            margin: auto;
            width: 70%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        thead {
            background-color: lightblue;
        }
    </style>
</head>
<body>

    <h2>Student Marks</h2>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Subject</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Jayant</td>
                <td>HTML</td>
                <td>91</td>
                <td>A+</td>
            </tr>

            <tr>
                <td>Ranveer</td>
                <td>CSS</td>
                <td>81</td>
                <td>A</td>
            </tr>

            <tr>
                <td>Tanmoy</td>
                <td>JavaScript</td>
                <td>90</td>
                <td>A+</td>
            </tr>

            <tr>
                <td>Yash</td>
                <td>Frontend</td>
                <td>82</td>
                <td>A</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
